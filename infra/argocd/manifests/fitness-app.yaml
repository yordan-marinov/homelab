apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mvg-labs/homelab.git
    targetRevision: main
    path: apps/fitness
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: fitness
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
