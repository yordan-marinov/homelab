apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mvg-labs/homelab.git
    targetRevision: HEAD
    path: apps/management/openclaw
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
