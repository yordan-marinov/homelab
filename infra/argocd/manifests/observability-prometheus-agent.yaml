apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-prometheus-agent
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 25.21.0
      helm:
        valueFiles:
          - $homelab/apps/observability/prometheus-agent/values.yaml

    - repoURL: https://github.com/mvg-labs/homelab.git
      targetRevision: main
      ref: homelab

    - repoURL: https://github.com/mvg-labs/homelab.git
      targetRevision: main
      path: apps/observability/prometheus-agent

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
