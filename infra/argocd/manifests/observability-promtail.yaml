apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mvg-labs/homelab.git
    targetRevision: main
    path: apps/observability/promtail
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
