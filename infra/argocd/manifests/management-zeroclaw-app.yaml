apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeroclaw-sre
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mvg-labs/homelab.git
    targetRevision: HEAD
    path: apps/management/zeroclaw
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
