apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wger-fitness
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://wger-project.github.io/helm-charts
      chart: wger
      targetRevision: 0.2.5
      helm:
        valueFiles:
          - $values/apps/fitness/values.yaml

    - repoURL: https://github.com/mvg-labs/homelab.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/mvg-labs/homelab.git
      targetRevision: main
      path: apps/fitness/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: fitness

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
