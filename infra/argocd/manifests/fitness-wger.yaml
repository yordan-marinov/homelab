apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wger-fitness
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mvg-labs/homelab.git
    targetRevision: main
    path: apps/fitness
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fitness
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
