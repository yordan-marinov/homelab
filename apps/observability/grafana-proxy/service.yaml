apiVersion: v1
kind: Service
metadata:
  name: grafana-external-svc
  namespace: monitoring
spec:
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: grafana-external-svc
  namespace: monitoring
subsets:
  - addresses:
      - ip: 192.168.102.3
    ports:
      - port: 3000
