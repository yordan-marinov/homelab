apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-prometheus-agent
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 28.14.0

    helm:
      valueFiles:
        - values.yaml

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 25.8.0
      helm:
        valueFiles:
          - $values/apps/observability/prometheus-agent/values.yaml

    - repoURL: https://github.com/<your-username>/homelab
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
