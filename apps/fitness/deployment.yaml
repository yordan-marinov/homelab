apiVersion: apps/v1
kind: Deployment
metadata:
  name: wger
  namespace: fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wger
  template:
    metadata:
      labels:
        app: wger
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-setup
          image: wger/server:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              python3 manage.py migrate --noinput &&
              python3 manage.py collectstatic --noinput
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: django-secret }
            - name: WGER_DB_ENGINE
              value: "django.db.backends.postgresql"
            - name: WGER_DB_NAME
              value: "wger"
            - name: WGER_DB_USER
              value: "wger"
            - name: WGER_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: db-password }
            - name: WGER_DB_HOST
              value: "127.0.0.1"
            - name: WGER_DB_PORT
              value: "5432"
          volumeMounts:
            - name: static-assets
              mountPath: /home/wger/static
            - name: media
              mountPath: /home/wger/media

      containers:
        - name: wger-app
          image: wger/server:latest
          command: ["/home/wger/venv/bin/gunicorn"]
          args:
            - "wger.wsgi:application"
            - "--bind=0.0.0.0:8000"
            - "--workers=3"
            - "--timeout=120"
            - "--access-logfile=-"
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: django-secret }
            - name: DJANGO_DEBUG
              value: "False"
            - name: WGER_DB_ENGINE
              value: "django.db.backends.postgresql"
            - name: WGER_DB_NAME
              value: "wger"
            - name: WGER_DB_USER
              value: "wger"
            - name: WGER_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: db-password }
            - name: WGER_DB_HOST
              value: "127.0.0.1"
            - name: WGER_DB_PORT
              value: "5432"
            - name: WGER_SITE_URL
              value: "https://fitness.mvgates.com"
            - name: DJANGO_ALLOWED_HOSTS
              value: "fitness.mvgates.com,127.0.0.1,localhost"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://fitness.mvgates.com"
            - name: SECURE_PROXY_SSL_HEADER
              value: "HTTP_X_FORWARDED_PROTO,https"
            - name: DJANGO_SERVE_STATIC_FILES
              value: "True"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: static-assets
              mountPath: /home/wger/static
            - name: media
              mountPath: /home/wger/media

        - name: db
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "wger"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: db-password }
            - name: POSTGRES_DB
              value: "wger"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: db-data
          persistentVolumeClaim: { claimName: fitness-db-pvc }
        - name: media
          persistentVolumeClaim: { claimName: fitness-media-pvc }
        - name: static-assets
          emptyDir: {}
