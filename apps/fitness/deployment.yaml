apiVersion: apps/v1
kind: Deployment
metadata:
  name: wger
  namespace: fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wger
  template:
    metadata:
      labels:
        app: wger
    spec:
      securityContext:
        fsGroup: 999

      containers:
        - name: wger-app
          image: wger/server:latest
          env:
            - name: WGER_PRODUCTION
              value: "True"
            - name: DJANGO_DEBUG
              value: "False"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: django-secret }
            - name: WGER_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: db-password }
            - name: WGER_PORT
              value: "8000"
            - name: WGER_SITE_URL
              value: "https://fitness.mvgates.com"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: static-assets
              mountPath: /home/wger/static
            - name: media
              mountPath: /home/wger/media
            - name: settings-override
              mountPath: /home/wger/src/wger/settings_local.py
              subPath: settings_local.py

        - name: db
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "wger"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: fitness-auth, key: db-password }
            - name: POSTGRES_DB
              value: "wger"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: db-data
          persistentVolumeClaim: { claimName: fitness-db-pvc }
        - name: media
          persistentVolumeClaim: { claimName: fitness-media-pvc }
        - name: static-assets
          emptyDir: {}
        - name: settings-override
          configMap:
            name: wger-settings
