apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fitness-db-pvc
  namespace: fitness
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ceph-block
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fitness-media-pvc
  namespace: fitness
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ceph-block
  resources:
    requests:
      storage: 10Gi
