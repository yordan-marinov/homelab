wger:
  existingSecret: pihole-web-password
  secretKeyKey: django-secret

  settings:
    SITE_URL: "https://fitness.mvgates.com"
    ALLOWED_HOSTS: "fitness.mvgates.com,localhost,127.0.0.1"
    TIME_ZONE: "Europe/Sofia"
    DEBUG: false

postgresql:
  enabled: true
  auth:
    database: wger
    username: wger
    existingSecret: fitness-auth
    secretKeys:
      userPasswordKey: db-password
  primary:
    persistence:
      enabled: true
      storageClass: "ceph-block"
      size: 5Gi

persistence:
  media:
    enabled: true
    storageClass: "ceph-block"
    size: 10Gi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: fitness.mvgates.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: fitness-mvgates-tls
