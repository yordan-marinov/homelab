wger:
  app:
    production: true

  settings:
    SITE_URL: "https://fitness.mvgates.com"
    ALLOWED_HOSTS: "fitness.mvgates.com,localhost,127.0.0.1"
    TIME_ZONE: "Europe/Sofia"
    SECURE_PROXY_SSL_HEADER: "['HTTP_X_FORWARDED_PROTO', 'https']"

  existingSecret: fitness-auth
  secretKeyKey: django-secret

  postgresql:
    enabled: true
    auth:
      database: wger
      username: wger
      existingSecret: fitness-auth
      secretKeys:
        userPasswordKey: db-password
    primary:
      persistence:
        enabled: true
        storageClass: "ceph-block"
        size: 5Gi

  ingress:
    enabled: true
    className: "traefik"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: fitness.mvgates.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: fitness-mvgates-tls
