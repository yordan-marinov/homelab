wger:
  app:
    production: true    # This triggers Gunicorn
  settings:
    SITE_URL: "https://fitness.mvgates.com"
    ALLOWED_HOSTS: "fitness.mvgates.com,127.0.0.1,localhost"
    TIME_ZONE: "Europe/Sofia"
    SECURE_PROXY_SSL_HEADER: "['HTTP_X_FORWARDED_PROTO', 'https']"

  existingSecret: fitness-auth
  secretKeyKey: django-secret

postgresql:
  enabled: true
  auth:
    database: wger
    username: wger
    existingSecret: fitness-auth
    secretKeys:
      userPasswordKey: db-password
  primary:
    persistence:
      enabled: true
      storageClass: "ceph-block"
      size: 5Gi

persistence:
  media:
    enabled: true
    storageClass: "ceph-block"
    size: 10Gi

ingress:
  enabled: true
  className: "traefik-release"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: fitness.mvgates.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fitness-mvgates-tls
