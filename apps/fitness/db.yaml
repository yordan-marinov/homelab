apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fitness-db
  namespace: fitness
spec:
  serviceName: fitness-db
  replicas: 1
  selector:
    matchLabels: { app: fitness-db }
  template:
    metadata:
      labels: { app: fitness-db }
    spec:
      securityContext: { fsGroup: 999 }
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "wger"
            - name: POSTGRES_USER
              value: "wger"
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: fitness-auth, key: db-password } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: db-data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ceph-block
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-db
  namespace: fitness
spec:
  selector: { app: fitness-db }
  ports: [{ port: 5432 }]
