apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:latest
          env:
            - name: TZ
              value: "Europe/Sofia"
            - name: WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-web-password
                  key: password
            - name: PIHOLE_DNS_
              value: "192.168.111.1"
            - name: FTLCONF_LOCAL_IPV4
              value: "192.168.111.53"
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
            - name: dnsmasq
              mountPath: /etc/dnsmasq.d
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pihole-config-pvc # Ceph RBD
        - name: dnsmasq
          persistentVolumeClaim:
            claimName: pihole-dnsmasq-pvc # Ceph RBD
