apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: open-webui-web
  namespace: management
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`ai.mvgates.com`)
      kind: Rule
      middlewares:
        - name: webui-streaming
      services:
        - name: open-webui
          port: 8080
  tls:
    secretName: ai-mvgates-tls
