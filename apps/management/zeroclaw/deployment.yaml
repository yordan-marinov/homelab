apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets:
        - name: zeroclaw-ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: repo-provisioner
          image: alpine/git
          env:
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /work
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/homelab.git homelab
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/brainbox-mirror.git brainbox
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/homelab-mgmt-infra.git infra
          volumeMounts:
            - name: workspace
              mountPath: /work
      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/homelab"
            - name: ZEROCLAW_STATIC_TOKEN
              value: "homecrew-sre-secure-token-123"
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p ~/.zeroclaw

              echo "[1/3] Onboarding Agent..."
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/3] Patching Config (Removing duplicates)..."
              # This line deletes from the first '[gateway]' match to the end of the file
              # to ensure we don't have duplicate keys.
              sed -i '/\[gateway\]/,$d' /work/homelab/config.toml

              # Append the fresh, correct gateway block
              cat <<EOF >> /work/homelab/config.toml

              [gateway]
              host = "0.0.0.0"
              port = 18789
              allow_public_bind = true
              token = "$ZEROCLAW_STATIC_TOKEN"
              EOF

              echo "[3/3] Starting ZeroClaw SRE Daemon..."
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789
      volumes:
        - name: workspace
          emptyDir: {}
