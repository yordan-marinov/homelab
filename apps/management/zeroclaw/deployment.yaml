apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext: { runAsUser: 0 }
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts: [{ name: workspace, mountPath: /work }]

      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          env:
            - name: HOME
              value: "/work"
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # 1. Ensure the directory exists
              mkdir -p /work/.zeroclaw

              echo "[1/3] Initializing DB (onboard)..."
              # We run onboard with a dummy key just to initialize the SQLite DB and folders
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/3] BRUTE FORCE: Overwriting /work/.zeroclaw/config.toml with ConfigMap..."
              # We copy our perfect config from the read-only mount to the active path
              cp /tmp/config-source/config.toml /work/.zeroclaw/config.toml

              # Inject the real API key into the file we just copied
              sed -i "s|api_key = .*|api_key = \"$OPENAI_API_KEY\"|" /work/.zeroclaw/config.toml

              echo "[3/3] Starting ZeroClaw Daemon..."
              # This will now load /work/.zeroclaw/config.toml and see source="file"
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
            - name: config-source
              mountPath: /tmp/config-source
          ports:
            - containerPort: 18789

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts: [{ name: workspace, mountPath: /work }]

      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: zeroclaw-workspace-pvc }
        - name: config-source
          configMap:
            name: zeroclaw-config
