apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw-sre
  template:
    metadata:
      labels:
        app: zeroclaw-sre
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets:
        - name: zeroclaw-ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: repo-provisioner
          image: alpine/git
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: zeroclaw-app-secrets, key: github_token }
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /work
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/homelab.git homelab
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/brainbox-mirror.git brainbox
              git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/homelab-mgmt-infra.git infra
          volumeMounts:
            - name: workspace
              mountPath: /work
      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/homelab"
            - name: ZEROCLAW_STATIC_TOKEN
              value: "homecrew-sre-secure-token-123"
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p ~/.zeroclaw

              echo "[1/3] Onboarding Agent..."
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/3] Patching Config for Headless K8s Mode..."
              # Force 0.0.0.0 so the K8s Service can reach the pod
              sed -i 's/127.0.0.1/0.0.0.0/g' /work/homelab/config.toml
              # Force our desired port
              sed -i 's/42617/18789/g' /work/homelab/config.toml
              # Inject the static token to bypass pairing UI
              echo "gateway_token = \"$ZEROCLAW_STATIC_TOKEN\"" >> /work/homelab/config.toml

              echo "[3/3] Starting ZeroClaw SRE Daemon..."
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789
      volumes:
        - name: workspace
          emptyDir: {}
