apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext: { runAsUser: 0 }
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts: [{ name: workspace, mountPath: /work }]
      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: HOME
              value: "/work"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/.zeroclaw

              echo "[1/4] Initializing ZeroClaw..."
              # Onboard creates the initial SQLite DB and workspace
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/4] Patching Networking (0.0.0.0)..."
              # We only patch what we know works: the host and public bind
              sed -i 's/127.0.0.1/0.0.0.0/g' /work/.zeroclaw/config.toml
              if ! grep -q "allow_public_bind" /work/.zeroclaw/config.toml; then
                sed -i '/\[gateway\]/a allow_public_bind = true' /work/.zeroclaw/config.toml
              fi
              sed -i 's/port = 42617/port = 18789/' /work/.zeroclaw/config.toml

              echo "[3/4] Starting Daemon and Waiting for Pairing Code..."
              # Start daemon in background and redirect output to a file we can read
              zeroclaw daemon > /work/daemon.log 2>&1 &

              # Wait up to 60 seconds for the pairing code to appear
              for i in {1..30}; do
                if grep -q "one-time code" /work/daemon.log; then
                  # Extract the 6-digit code using a more robust grep
                  CODE=$$(grep -A 2 "one-time code" /work/daemon.log | tail -n 1 | grep -o '[0-9]\{6\}')

                  if [ ! -z "$$CODE" ]; then
                    echo "[✓] Found Pairing Code: $$CODE"
                    echo "[✓] Attempting Self-Pairing..."

                    # Perform the pairing request
                    RESPONSE=$$(curl -s -X POST http://127.0.0.1:18789/pair -H "X-Pairing-Code: $$CODE")

                    echo "[✓] Pairing Response: $$RESPONSE"

                    # Extract the session token
                    TOKEN=$$(echo $$RESPONSE | grep -o '"token":"[^"]*' | cut -d'"' -f4)
                    echo "--------------------------------------------------------"
                    echo "SUCCESS! YOUR PERMANENT SRE TOKEN IS:"
                    echo "$$TOKEN"
                    echo "--------------------------------------------------------"
                    break
                  fi
                fi
                echo "Waiting for code... ($$i/30)"
                sleep 2
              done

              echo "[4/4] SRE Agent is Online. Tailing logs..."
              tail -f /work/daemon.log
          volumeMounts: [{ name: workspace, mountPath: /work }]
          ports: [{ containerPort: 18789 }]

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext: { runAsUser: 1000 }
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts: [{ name: workspace, mountPath: /work }]

      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: zeroclaw-workspace-pvc }
