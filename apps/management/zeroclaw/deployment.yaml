apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext: { runAsUser: 0 }
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts: [{ name: workspace, mountPath: /work }]

      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          env:
            - name: HOME
              value: "/work"
            # FORCE the binary to use our ConfigMap file
            - name: ZEROCLAW_CONFIG_PATH
              value: "/etc/zeroclaw/config.toml"
            # Overwrite the 'placeholder' in config.toml with the real key
            - name: ZEROCLAW_LLM_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "[1/2] Initializing Database..."
              # Onboard only to set up the SQLite DB, it won't overwrite our mounted config
              zeroclaw onboard --api-key $ZEROCLAW_LLM_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/2] Starting ZeroClaw Daemon..."
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
            - name: config-volume
              mountPath: /etc/zeroclaw
              readOnly: true
          ports:
            - containerPort: 18789

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts: [{ name: workspace, mountPath: /work }]

      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: zeroclaw-workspace-pvc }
        - name: config-volume
          configMap:
            name: zeroclaw-config
