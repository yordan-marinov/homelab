apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw-sre
  template:
    metadata:
      labels:
        app: zeroclaw-sre
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        # --- 1. PERMISSIONS FIXER (Runs as root) ---
        - name: volume-permissions-fixer
          image: busybox
          securityContext:
            runAsUser: 0
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts:
            - name: workspace
              mountPath: /work

        # --- 2. REPO PROVISIONER (Runs as 1000) ---
        - name: repo-provisioner
          image: alpine/git
          securityContext:
            runAsUser: 1000
          env:
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/git
              cd /work/git

              # If directory exists but isn't a git repo, clean it
              if [ -d "homelab" ] && [ ! -d "homelab/.git" ]; then
                echo "Cleaning up incomplete clone..."
                rm -rf homelab
              fi

              # Clone if missing
              if [ ! -d "homelab/.git" ]; then
                echo "Cloning homelab repo..."
                git clone https://${GITHUB_TOKEN}@github.com/mvg-labs/homelab.git homelab
              else
                echo "Repo already exists, skipping."
              fi
          volumeMounts:
            - name: workspace
              mountPath: /work

      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: HOME
              value: "/work"
            - name: ZEROCLAW_CONFIG_PATH
              value: "/work/config.toml"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/git/homelab/apps/management/zeroclaw"
            - name: SRE_STATIC_TOKEN
              value: "mvg-labs-sre-super-secret-token-2024"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Ensure config exists on PVC
              if [ ! -f "$ZEROCLAW_CONFIG_PATH" ]; then
                echo "[BOOTSTRAP] Initializing Config..."
                zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

                sed -i '/\[gateway\]/,$d' "$ZEROCLAW_CONFIG_PATH"
                cat <<EOF >> "$ZEROCLAW_CONFIG_PATH"
              [gateway]
              host = "0.0.0.0"
              port = 18789
              allow_public_bind = true
              api_token = "$SRE_STATIC_TOKEN"
              pairing_enabled = false

              [workspace]
              identity_path = "/work/git/homelab/apps/management/zeroclaw/core/IDENTITY.md"
              soul_path = "/work/git/homelab/apps/management/zeroclaw/core/SOUL.md"
              policies_path = "/work/git/homelab/apps/management/zeroclaw/core/POLICIES.md"
              user_path = "/work/git/homelab/apps/management/zeroclaw/core/USER.md"

              [skills]
              paths = ["/work/git/homelab/apps/management/zeroclaw/skills"]
              EOF
              fi

              echo "[BOOTSTRAP] SRE Agent Starting..."
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext:
            runAsUser: 1000
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/git
            - --link=homelab
          env:
            - name: GIT_SYNC_USERNAME
              value: "git"
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
          volumeMounts:
            - name: workspace
              mountPath: /work

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: zeroclaw-workspace-pvc
