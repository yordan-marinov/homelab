apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext: { runAsUser: 0 }
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts: [{ name: workspace, mountPath: /work }]
      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            # --- THE MAGIC FIX: DOUBLE UNDERSCORES ---
            # These override the [gateway] section in config.toml
            - name: ZEROCLAW_GATEWAY__HOST
              value: "0.0.0.0"
            - name: ZEROCLAW_GATEWAY__PORT
              value: "18789"
            - name: ZEROCLAW_GATEWAY__ALLOW_PUBLIC_BIND
              value: "true"
            - name: ZEROCLAW_GATEWAY__PAIRING_ENABLED
              value: "false"

            # These override the [llm] section (Fixes the OpenRouter error)
            - name: ZEROCLAW_LLM__PROVIDER
              value: "openai"
            - name: ZEROCLAW_LLM__MODEL
              value: "homecrew-sre-brain"
            - name: ZEROCLAW_LLM__BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: ZEROCLAW_LLM__API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }

            # These override the [workspace] section
            - name: ZEROCLAW_WORKSPACE__BASE_PATH
              value: "/work/repo/homelab/apps/management/zeroclaw"
            - name: ZEROCLAW_WORKSPACE__IDENTITY_PATH
              value: "/work/repo/homelab/apps/management/zeroclaw/core/IDENTITY.md"
            - name: ZEROCLAW_WORKSPACE__SOUL_PATH
              value: "/work/repo/homelab/apps/management/zeroclaw/core/SOUL.md"

            - name: HOME
              value: "/work"
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/.zeroclaw

              echo "[1/2] Initializing Workspace..."
              # Onboard is still needed once to create the internal SQLite database
              # We use --force to ensure it doesn't hang on prompts
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/2] Starting ZeroClaw SRE Daemon..."
              # The Double-Underscore Env Vars will now force the daemon to 0.0.0.0:18789
              # and use your LiteLLM brain.
              zeroclaw daemon > /work/daemon.log 2>&1 &

              # Self-Pairing logic (only runs if pairing is required)
              sleep 15
              if grep -q "one-time code" /work/daemon.log; then
                CODE=$$(grep -A 2 "one-time code" /work/daemon.log | tail -n 1 | grep -o '[0-9]\{6\}')
                echo "[!] Pairing Code detected: $$CODE"
                RESPONSE=$$(curl -s -X POST http://127.0.0.1:18789/pair -H "X-Pairing-Code: $$CODE")
                TOKEN=$$(echo $$RESPONSE | grep -o '"token":"[^"]*' | cut -d'"' -f4)
                echo "--------------------------------------------------------"
                echo "SUCCESS! YOUR PERMANENT SRE TOKEN IS:"
                echo "$$TOKEN"
                echo "--------------------------------------------------------"
              fi

              tail -f /work/daemon.log
          volumeMounts: [{ name: workspace, mountPath: /work }]
          ports: [{ containerPort: 18789 }]

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext: { runAsUser: 1000 }
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts: [{ name: workspace, mountPath: /work }]

      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: zeroclaw-workspace-pvc }
