apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw-sre
  template:
    metadata:
      labels:
        app: zeroclaw-sre
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext:
            runAsUser: 0
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts:
            - name: workspace
              mountPath: /work

      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: HOME
              value: "/work"
            - name: ZEROCLAW_CONFIG_PATH
              value: "/work/config.toml"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/repo/homelab/apps/management/zeroclaw"
            - name: SRE_STATIC_TOKEN
              value: "mvg-labs-sre-static-token-unique-2024"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/.zeroclaw

              echo "[1/3] Onboarding Agent..."
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/3] Surgically Patching config.toml..."
              sed -i 's/host = "127.0.0.1"/host = "0.0.0.0"/' /work/config.toml
              sed -i 's/port = 42617/port = 18789/' /work/config.toml

              sed -i '/\[gateway\]/a allow_public_bind = true' /work/config.toml
              sed -i "/\[gateway\]/a api_token = \"$SRE_STATIC_TOKEN\"" /work/config.toml
              sed -i '/\[gateway\]/a pairing_enabled = false' /work/config.toml

              sed -i "s|identity_path = .*|identity_path = \"/work/repo/homelab/apps/management/zeroclaw/core/IDENTITY.md\"|" /work/config.toml
              sed -i "s|soul_path = .*|soul_path = \"/work/repo/homelab/apps/management/zeroclaw/core/SOUL.md\"|" /work/config.toml

              if ! grep -q "skills" /work/config.toml; then
                cat <<EOF >> /work/config.toml
              [skills]
              paths = ["/work/repo/homelab/apps/management/zeroclaw/skills"]
              EOF
              fi

              echo "[3/3] Starting ZeroClaw SRE Daemon..."
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext:
            runAsUser: 1000
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts:
            - name: workspace
              mountPath: /work

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: zeroclaw-workspace-pvc
