apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets:
        - name: zeroclaw-ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: repo-provisioner
          image: alpine/git
          env:
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /work
              for repo in homelab brainbox-mirror homelab-mgmt-infra; do
                folder=$(echo $repo | sed 's/-mirror//; s/homelab-mgmt-//') # matches your prev naming
                if [ -d "$folder/.git" ]; then
                  echo "Updating $folder..."
                  cd $folder && git pull && cd ..
                else
                  echo "Cloning $repo..."
                  git clone https://$(GITHUB_TOKEN)@github.com/mvg-labs/$repo.git $folder
                fi
              done
          volumeMounts:
            - name: workspace
              mountPath: /work
      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/homelab"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Only onboard if config doesn't exist
              if [ ! -f "/work/homelab/config.toml" ]; then
                zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force
                sed -i '/\[gateway\]/,$d' /work/homelab/config.toml
                cat <<EOF >> /work/homelab/config.toml
              [gateway]
              host = "0.0.0.0"
              port = 18789
              allow_public_bind = true
              EOF
              fi

              # Start daemon in background
              zeroclaw daemon > /tmp/agent.log 2>&1 &

              # If not paired yet, do it
              sleep 5
              if grep -q "one-time code" /tmp/agent.log; then
                CODE=$(grep -A 2 "one-time code" /tmp/agent.log | tail -n 1 | grep -o '[0-9]\{6\}')
                curl -s -X POST http://127.0.0.1:18789/pair -H "X-Pairing-Code: $CODE"
              fi

              tail -f /tmp/agent.log
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: zeroclaw-workspace-pvc
