apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw-sre
  template:
    metadata:
      labels:
        app: zeroclaw-sre
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: volume-permissions-fixer
          image: busybox
          securityContext:
            runAsUser: 0
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts:
            - name: workspace
              mountPath: /work

      containers:
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"

            - name: HOME
              value: "/work"
            - name: ZEROCLAW_WORKSPACE
              value: "/work/repo/homelab/apps/management/zeroclaw"

            - name: ZEROCLAW_GATEWAY_HOST
              value: "0.0.0.0"
            - name: ZEROCLAW_GATEWAY_PORT
              value: "18789"
            - name: ZEROCLAW_GATEWAY_ALLOW_PUBLIC_BIND
              value: "true"
            - name: ZEROCLAW_GATEWAY_PAIRING_ENABLED
              value: "false"
            - name: ZEROCLAW_API_TOKEN
              value: "mvg-labs-sre-static-token-unique-2024"

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/.zeroclaw

              echo "[1/2] Initializing SRE Identity..."
              # Onboard creates the DB and base workspace files
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/2] Starting ZeroClaw SRE Daemon..."
              # The environment variables above will override the config.toml settings automatically
              exec zeroclaw daemon
          volumeMounts:
            - name: workspace
              mountPath: /work
          ports:
            - containerPort: 18789

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext:
            runAsUser: 1000
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts:
            - name: workspace
              mountPath: /work

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: zeroclaw-workspace-pvc
