apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw-sre
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeroclaw-sre }
  template:
    metadata:
      labels: { app: zeroclaw-sre }
    spec:
      serviceAccountName: zeroclaw-sre-sa
      imagePullSecrets: [{ name: zeroclaw-ghcr-pull-secret }]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # 1. FIX PERMISSIONS (Ensures user 1000 can write to PVC)
        - name: volume-permissions-fixer
          image: busybox
          securityContext: { runAsUser: 0 }
          command: ["sh", "-c", "chown -R 1000:1000 /work && chmod -R 775 /work"]
          volumeMounts: [{ name: workspace, mountPath: /work }]
      containers:
        # --- THE SRE AGENT ---
        - name: agent
          image: ghcr.io/mvg-labs/zeroclaw-sre:latest
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: virtual_key } }
            - name: OPENAI_API_BASE
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: HOME
              value: "/work"
            # Force safety flags via environment as well
            - name: ZEROCLAW_ALLOW_PUBLIC_BIND
              value: "true"
            - name: ZEROCLAW_GATEWAY_ALLOW_PUBLIC_BIND
              value: "true"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /work/.zeroclaw

              echo "[1/3] Initializing ZeroClaw..."
              # Onboard creates the config exactly how the binary likes it
              zeroclaw onboard --api-key $OPENAI_API_KEY --provider openai --model "homecrew-sre-brain" --force

              echo "[2/3] Surgically Patching config.toml..."
              # 1. Change Host to 0.0.0.0
              sed -i 's/127.0.0.1/0.0.0.0/g' /work/.zeroclaw/config.toml
              # 2. Change Port to 18789
              sed -i 's/42617/18789/g' /work/.zeroclaw/config.toml
              sed -i 's/8080/18789/g' /work/.zeroclaw/config.toml
              # 3. Insert the Safety Flag right under the [gateway] header
              sed -i '/\[gateway\]/a allow_public_bind = true' /work/.zeroclaw/config.toml

              # 4. Point to your Git-Sync Workspace
              sed -i "s|base_path = .*|base_path = \"/work/repo/homelab/apps/management/zeroclaw\"|" /work/.zeroclaw/config.toml

              echo "[3/3] Starting Daemon..."
              # Start daemon and capture logs
              zeroclaw daemon > /work/daemon.log 2>&1 &

              # Small sleep to allow self-pairing if the PVC was wiped,
              # otherwise it just tails the logs.
              sleep 10
              if grep -q "one-time code" /work/daemon.log; then
                CODE=$$(grep -A 2 "one-time code" /work/daemon.log | tail -n 1 | grep -o '[0-9]\{6\}')
                curl -s -X POST http://127.0.0.1:18789/pair -H "X-Pairing-Code: $$CODE"
              fi

              tail -f /work/daemon.log
          volumeMounts: [{ name: workspace, mountPath: /work }]
          ports: [{ containerPort: 18789 }]

        # --- THE SYNC SIDECAR ---
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.3
          securityContext: { runAsUser: 1000 }
          args:
            - --repo=https://github.com/mvg-labs/homelab.git
            - --branch=main
            - --wait=60
            - --root=/work/repo
            - --link=homelab
          env:
            - name: GIT_SYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: zeroclaw-app-secrets, key: github_token } }
            - name: GIT_SYNC_USERNAME
              value: "mvg-labs-bot"
          volumeMounts: [{ name: workspace, mountPath: /work }]

      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: zeroclaw-workspace-pvc }
