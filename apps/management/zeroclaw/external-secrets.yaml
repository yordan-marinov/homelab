apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zeroclaw-ghcr-pull-secret
  namespace: management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: zeroclaw-ghcr-store
    kind: ClusterSecretStore
  target:
    name: zeroclaw-ghcr-pull-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zeroclaw-app-secrets
  namespace: management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: zeroclaw-app-store
    kind: ClusterSecretStore
  target:
    name: zeroclaw-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: virtual_key
      remoteRef:
        key: VIRTUAL_KEY
    - secretKey: github_token
      remoteRef:
        key: GITHUB_TOKEN
