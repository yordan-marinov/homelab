apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeroclaw-sre-sa
  namespace: management

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeroclaw-sre-readonly
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - endpoints
    - events
    - namespaces
    - nodes
    - persistentvolumes
    - persistentvolumeclaims
    - configmaps
  verbs: ["get", "list", "watch"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get", "list", "watch"]

- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
  verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeroclaw-sre-readonly-binding
subjects:
- kind: ServiceAccount
  name: zeroclaw-sre-sa
  namespace: management
roleRef:
  kind: ClusterRole
  name: zeroclaw-sre-readonly
  apiGroup: rbac.authorization.k8s.io
