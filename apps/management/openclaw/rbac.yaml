apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-sa
  namespace: management

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-readonly

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - events
    - namespaces
    - nodes
    - persistentvolumes
    - persistentvolumeclaims
  verbs: ["get","list","watch"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get","list","watch"]

- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
  verbs: ["get","list","watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-readonly

subjects:
- kind: ServiceAccount
  name: openclaw-sa
  namespace: management

roleRef:
  kind: ClusterRole
  name: openclaw-readonly
  apiGroup: rbac.authorization.k8s.io

