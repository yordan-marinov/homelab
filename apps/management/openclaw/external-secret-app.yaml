apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zeroclaw-secrets
  namespace: management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-openclaw-store
    kind: ClusterSecretStore
  target:
    name: zeroclaw-secrets
    creationPolicy: Owner
  data:
    - secretKey: virtual_key
      remoteRef:
        key: /services/openclaw
        property: virtual_key
    - secretKey: github_token
      remoteRef:
        key: /services/openclaw
        property: github_token
