apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: management

data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,

        "trustedProxies": [
          "10.0.0.0/8",
          "10.244.0.0/16"
        ],

        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "https://claw.mvgates.com"
          ]
        }
      },

      "models": {
        "providers": {
          "litellm": {
            "baseUrl": "http://litellm-service.ai-core.svc.cluster.local:4000",
            "apiKey": "${LITELLM_API_KEY}",
            "api": "openai-completions",

            "models": [
              {
                "id": "openai/gpt-4.1-nano",
                "name": "GPT-4.1 Nano",
                "reasoning": false,
                "input": ["text"],
                "contextWindow": 128000,
                "maxTokens": 8192
              }
            ]
          }
        }
      },

      "agents": {
        "defaults": {
          "model": {
            "primary": "openai/gpt-4.1-nano"
          }
        }
      }
    }

