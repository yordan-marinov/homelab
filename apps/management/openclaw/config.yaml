apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: management
data:
  config.yml: |
    gateway:
      host: "0.0.0.0"
      port: 18789
      trustedProxies:
        - "127.0.0.1"
        - "10.0.0.0/8"
        - "192.168.0.0/16"
      controlUi:
        enabled: true
        url: "https://claw.mvgates.com"
        allowedOrigins:
          - "https://claw.mvgates.com"
          - "http://localhost:8000"
