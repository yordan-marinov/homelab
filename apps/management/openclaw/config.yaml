apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: management
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://claw.mvgates.com", "https://ai.mvgates.com"]
        }
      },
      "llm": {
        "provider": "openai",
        "baseUrl": "http://litellm-service.ai-core.svc.cluster.local:4000",
        "model": "homecrew-sre-brain"
      }
    }
