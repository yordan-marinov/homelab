apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: management
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.244.0.0/16"],
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://claw.mvgates.com"],
          "dangerouslyAllowHostHeaderOriginFallback": false
        }
      },
      "agent": {
        "provider": "litellm",
        "model": "gpt-4.1-nano",
        "apiBaseUrl": "http://litellm-service.ai-core.svc.cluster.local:4000/v1",
        "authEnv": "LITELLM_API_KEY"
      }
    }

