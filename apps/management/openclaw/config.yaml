apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: management

data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,

        "trustedProxies": [
          "10.0.0.0/8",
          "10.244.0.0/16"
        ],

        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "https://claw.mvgates.com"
          ]
        }
      },

      "agents": {
        "defaults": {
          "model": {
            "primary": "gpt-4.1-nano"
          }
        }
      }
    }

