apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: management

spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`claw.mvgates.com`)
      kind: Rule
      services:
        - name: openclaw-service
          port: 80

  tls:
    secretName: openclaw-tls

