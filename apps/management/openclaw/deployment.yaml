apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw-sa
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/mvg-labs/openclaw-sre:1.15
          command: ["/bootstrap.sh"]
          args: ["node", "dist/index.js", "gateway"]
          env:
            - name: OPENAI_API_BASE
              value: http://litellm-service.ai-core.svc.cluster.local:4000
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-agent-secret, key: github_token }
          volumeMounts:
            - name: openclaw-data
              mountPath: /data
            - name: openclaw-config
              mountPath: /data/openclaw.json
              subPath: openclaw.json

        - name: git-sync
          image: alpine/git
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "Syncing Repos..."
                cd /data/repos/homelab && git pull
                cd /data/repos/brainbox && git pull
                rsync -av --delete /data/repos/homelab/apps/management/openclaw/skills/ /app/skills/
                sleep 300
              done
          volumeMounts:
            - name: openclaw-data
              mountPath: /data

      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
