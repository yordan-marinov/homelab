apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      securityContext:
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always

          command:
            - sh
            - -c

          args:
            - |
              echo "Preparing OpenClaw runtime..."

              mkdir -p /tmp/openclaw
              mkdir -p /tmp/openclaw/canvas
              mkdir -p /tmp/openclaw/cron
              mkdir -p /tmp/openclaw/devices
              mkdir -p /tmp/openclaw/workspace

              export HOME=/tmp/openclaw
              export OPENCLAW_STATE_DIR=/tmp/openclaw
              export OPENCLAW_WORKSPACE_DIR=/tmp/openclaw/workspace

              echo "Starting OpenClaw..."

              node dist/index.js gateway \
                --bind lan \
                --port 18789 \
                --allow-unconfigured

          ports:
            - containerPort: 18789
              name: http

          env:
            - name: HOME
              value: "/tmp/openclaw"

            - name: OPENCLAW_STATE_DIR
              value: "/tmp/openclaw"

            - name: OPENCLAW_WORKSPACE_DIR
              value: "/tmp/openclaw/workspace"

            - name: OPENCLAW_AGENT_MODEL
              value: "litellm/gpt-4.1-nano"

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

            - name: OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS
              value: "https://claw.mvgates.com"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 40
            periodSeconds: 20

