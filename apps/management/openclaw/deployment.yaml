apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            # 1. THE "OPEN DOOR" POLICY (Temporary for Bootstrap)
            - name: GATEWAY_TRUSTED_PROXIES
              value: "0.0.0.0/0" # Trust everything for the handshake
            - name: GATEWAY_CONTROL_UI_ALLOWED_ORIGINS
              value: "*"       # Allow any origin for the handshake

            # 2. AUTHENTICATION
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }

            # 3. API & TOOLS
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: github_token }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab

        - name: ambassador
          image: alpine/socat:latest
          args: ["TCP-LISTEN:8000,fork,reuseaddr", "TCP:127.0.0.1:18789"]
          ports:
            - containerPort: 8000
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
