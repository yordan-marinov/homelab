apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            # 1. Force the app to use our specific config file
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/openclaw.json"

            # 2. Authentication (Highest precedence via Env)
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }

            # 3. Network Bind (The 'lan' setting tells it to listen on 0.0.0.0)
            - name: OPENCLAW_GATEWAY_BIND
              value: "lan"

            # 4. API & TOOLS
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: config-file
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: config-file
          configMap:
            name: openclaw-config
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
