apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      securityContext:
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always

          command:
            - sh
            - -c

          args:
            - |
              mkdir -p /home/node/.openclaw/canvas
              mkdir -p /home/node/.openclaw/cron
              chown -R 4000:4000 /home/node/.openclaw || true

              node dist/index.js gateway \
              --bind lan \
              --port 18789 \
              --allow-unconfigured

          ports:
            - containerPort: 18789
              name: http

          env:
            - name: HOME
              value: "/home/node"

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true

          securityContext:
            allowPrivilegeEscalation: false

          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 40
            periodSeconds: 20

      volumes:
        - name: config
          configMap:
            name: openclaw-config

