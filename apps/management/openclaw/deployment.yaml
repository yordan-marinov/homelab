apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /home/node/.openclaw && echo '{}' > /home/node/.openclaw/openclaw.json && chown -R 1000:1000 /home/node/.openclaw"]
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          command: ["node", "dist/index.js", "gateway"]
          args: ["--bind", "loopback", "--port", "18789", "--allow-unconfigured"]
          env:
            - name: HOME
              value: "/home/node"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }
            - name: GATEWAY_TRUSTED_PROXIES
              value: "127.0.0.1"
            - name: GATEWAY_CONTROL_UI_ALLOWED_ORIGINS
              value: "https://claw.mvgates.com"
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab

        - name: ambassador
          image: alpine/socat:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Bridge..."
              # Listens on 8000 (Cluster) -> Forwards to 127.0.0.1:18789 (Agent)
              while true; do
                socat TCP-LISTEN:8000,fork,reuseaddr TCP:127.0.0.1:18789
                sleep 2
              done
          ports:
            - containerPort: 8000

      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
