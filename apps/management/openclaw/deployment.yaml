apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          # We use the official command to force the bind to 0.0.0.0
          command: ["node", "dist/index.js", "gateway"]
          args: ["--bind", "lan", "--port", "18789", "--allow-unconfigured"]
          env:
            - name: HOME
              value: "/home/node"

            # --- THE FIX FROM THE BLOG & ERRORS ---
            # 1. Use the 'GATEWAY_' prefix (no OPENCLAW_ prefix)
            - name: GATEWAY_CONTROL_UI_ALLOWED_ORIGINS
              value: '["https://claw.mvgates.com"]' # Note: JSON array format

            # 2. This is the "Magic Switch" from your error log:
            - name: GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
              value: "true"

            # 3. Trust the Traefik IP range
            - name: GATEWAY_TRUSTED_PROXIES
              value: "10.244.0.0/16,127.0.0.1"
            # ---------------------------------------

            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
