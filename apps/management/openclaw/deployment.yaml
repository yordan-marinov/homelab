apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      containers:
        - name: openclaw
          image: ghcr.io/mvg-labs/openclaw-sre:1.15

          ports:
            - containerPort: 18789

          env:
            - name: HOME
              value: /data

            - name: OPENCLAW_STATE_DIR
              value: /data

            - name: OPENCLAW_WORKSPACE_DIR
              value: /data/workspace

            - name: OPENCLAW_SKILLS_DIR
              value: /data/skills

            - name: OPENAI_API_BASE
              value: http://litellm-service.ai-core.svc.cluster.local:4000

            - name: OPENAI_API_KEY
              value: dummy-key

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: github_token

            - name: GIT_AUTHOR_NAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: git_user_name

            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: git_user_email

          volumeMounts:
            - name: openclaw-data
              mountPath: /data

            - name: openclaw-config
              mountPath: /agent/config/openclaw.json
              subPath: openclaw.json

          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data

        - name: openclaw-config
          configMap:
            name: openclaw-config

