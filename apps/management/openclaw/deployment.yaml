apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest

          ports:
            - containerPort: 18789

          command:
            - node
            - dist/index.js
            - gateway

          env:

            - name: HOME
              value: /data

            - name: OPENCLAW_STATE_DIR
              value: /data

            - name: OPENCLAW_WORKSPACE_DIR
              value: /data/workspace

            - name: OPENAI_API_BASE
              value: http://litellm.management.svc.cluster.local:4000

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

          volumeMounts:

            - name: openclaw-data
              mountPath: /data

            - name: config
              mountPath: /data/openclaw.json
              subPath: openclaw.json

          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:

        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data

        - name: config
          configMap:
            name: openclaw-config

