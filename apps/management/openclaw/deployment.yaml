apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      securityContext:
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest

          command:
            - node
            - dist/index.js
            - gateway
          args:
            - --bind
            - lan
            - --port
            - "18789"
          ports:
            - containerPort: 18789

          env:
            - name: HOME
              value: "/home/node"

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

            - name: OPENCLAW_AGENT_MODEL
              value: "gpt-4.1-nano"

          volumeMounts:
             - name: config
               mountPath: /home/node/.openclaw/openclaw.json
               subPath: openclaw.json
               readOnly: true

          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: config
          configMap:
            name: openclaw-config

