apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always
          command: ["node", "dist/index.js", "gateway"]
          command: ["node", "dist/index.js", "gateway"]
          args:
            - "--bind"
            - "lan"
            - "--port"
            - "18789"

        ports:
            - containerPort: 18789

          env:
            - name: HOME
              value: "/home/node"

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw

            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json

            - name: brainbox
              mountPath: /app/brainbox

            - name: homelab-repo
              mountPath: /app/homelab

          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-state-pvc

        - name: config
          configMap:
            name: openclaw-config

        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox

        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab

