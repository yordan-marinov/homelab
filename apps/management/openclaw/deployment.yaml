apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      containers:
        # --- CONTAINER 1: THE AGENT ---
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            # AUTH & TRUST
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }

            - name: GATEWAY_TRUSTED_PROXIES
              value: "127.0.0.1,10.0.0.0/8,192.168.0.0/16"

            - name: GATEWAY_CONTROL_UI_ALLOWED_ORIGINS
              value: "https://claw.mvgates.com"
            - name: GATEWAY_CONTROL_UI_URL
              value: "https://claw.mvgates.com"

            # API & TOOLS
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab

        # --- CONTAINER 2: THE AMBASSADOR (Resilient Version) ---
        - name: ambassador
          image: alpine/socat:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Resilient Bridge..."
              # This loop ensures that if the agent isn't ready or restarts,
              # the bridge stays alive and keeps trying.
              while true; do
                socat TCP-LISTEN:8000,fork,reuseaddr TCP:127.0.0.1:18789
                echo "Bridge disconnected or agent not ready. Retrying in 2s..."
                sleep 2
              done
          ports:
            - containerPort: 8000

      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
