apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      serviceAccountName: openclaw-sa

      imagePullSecrets:
        - name: ghcr-secret

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:

        - name: openclaw

          image: ghcr.io/mvg-labs/openclaw-sre:1.5
          imagePullPolicy: Always

          command:
            - /bootstrap.sh

          args:
            - node
            - dist/index.js
            - gateway

          ports:
            - containerPort: 18789

          env:

            - name: HOME
              value: /data

            - name: OPENCLAW_STATE_DIR
              value: /data

            - name: OPENCLAW_WORKSPACE_DIR
              value: /data/workspace

            - name: OPENAI_API_BASE
              value: http://litellm-service.ai-core.svc.cluster.local:4000

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: virtual_key

            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway_token

            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: github_token

            - name: GIT_AUTHOR_NAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: git_user_name

            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                secretKeyRef:
                  name: openclaw-agent-secret
                  key: git_user_email

          volumeMounts:

            - name: openclaw-data
              mountPath: /data

            - name: openclaw-config
              mountPath: /data/openclaw.json
              subPath: openclaw.json

            - name: workspace
              mountPath: /data/workspace

          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 40
            periodSeconds: 20

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

      volumes:

        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data

        - name: openclaw-config
          configMap:
            name: openclaw-config

        - name: workspace
          emptyDir: {}

