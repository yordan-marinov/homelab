apiVersion: apps/v1
kind: Deployment
metadata:
  name: neural-web
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neural-web
  template:
    metadata:
      labels:
        app: neural-web
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: nginx-index
