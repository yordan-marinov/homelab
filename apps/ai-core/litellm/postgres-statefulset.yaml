apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: litellm-postgres
  namespace: ai-core

spec:
  serviceName: litellm-postgres
  replicas: 1

  selector:
    matchLabels:
      app: litellm-postgres

  template:
    metadata:
      labels:
        app: litellm-postgres

    spec:
      containers:
        - name: postgres
          image: bitnami/postgresql:16

          env:
            - name: POSTGRESQL_USERNAME
              value: postgres

            - name: POSTGRESQL_PASSWORD
              value: postgres

            - name: POSTGRESQL_DATABASE
              value: litellm

          ports:
            - containerPort: 5432

          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: litellm-db-pvc

